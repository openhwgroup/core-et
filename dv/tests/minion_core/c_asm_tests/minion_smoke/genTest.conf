[general]
 # number of code snippets to generate
length = 150000
scratch_size = 1M
[probs]
# instruction weights
weight_int_arith=200
weight_int_mem=200
weight_int_div=70
weight_fp_arith=200
weight_fp_mem=200
weight_trans=50
weight_fp2int=50
weight_int2fp=50
weight_gsc=100
weight_illegal=10
weight_branch=35
weight_mask=40
weight_mask2int=40
weight_evict=0
weight_gsc_progress = 20
weight_fcsr = 15

prob_breakpoint_xcpt=10
prob_pma_xcpt=10
prob_invalid_rm=5

[rf]
# register selection can be either uniform or weigthed with priority to recently used registers
# the following option selects percentage of times a reg is selected with an uniform distribution
uniform = 10

# when giving priority to recently used registers, a geometric distribution is used, 
#  with CDF=1-(1-p)^(i+1)
# where i represents the index of the registers, ordered by last used (e.g. 0 is the last recently used)
# and p is a parameter between 0 and 1, configurable with:
geometric_param = 0.15

# this applies to mask registers: percentage of writes to a mask reg that are forced to m0 (random destination otherwise)
m0_writes = 70

[branch]
#percentage of branches that are unconditional
unconditional=30
#branch length (in 'snippets')
unconditional_length_range=1,16
conditional_length_range = 1,128

[mem]
# percentage of times it will try to reuse the same address (if loaded into a register)
reuse_ad=80
# percentage of times it will have an exception (unless masked)
debug_xcpt=10
pma_xcpt=10

[bugs]
# temporary workarounds for jiras

# RTLMIN-6295 => problems with PS instructions and breakpoints
force_nonzero_m0 = true
# RTLMIN-6474 => BEMU and RTL mismatch on the instructions definition
enable_fxx_ps_inst = false
