#
# Configuration oriented towards memory traffic only
# loads/stores, cacheops, tensor loads/stores

[INSTRUCTIONS]
# Percentage split of instructions
# The sum of the percentage(s) below must add up to 100.
Base = 40
SPFloat = 35
DPFloat = 0
Privileged = 4
Atomic = 0
Compressed = 0
Illegal = 1
NonStandardExtensions = 20

[INSTRUCTIONS_BASE]
# Percentage split of Base Integer instructions
# The sum of the percentage(s) below must add up to 100.
Computational = 20
ControlTransfer = 10
LoadStore = 70
System = 0

[INSTRUCTIONS_SP_FLOAT]
# Single-Precision Floating-Point Instructions
# The sum of the percentage(s) below must add up to 100.
Computational = 10
LoadStore = 70
ConversionMove = 5
Compare = 10
Classify = 5

[HAZARDS]
NumberOfPreviousRegistersToConsider = 8

# Probability of a source register being the destination of one of the previous instructions
ReadAfterWrite = 0.7
# Probability of a destination register being the source of one of the previous instructions
WriteAfterRead = 0.4
# Probability of a destination registers being the destination of one of the previous instructions
WriteAfterWrite = 0.3
