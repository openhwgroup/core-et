#
# Configuration oriented towards memory traffic only
# loads/stores, cacheops, tensor loads/stores
#
[DEFAULT]
# Default number of instructions to generate
NumberOfInstructions = 2500

# Default number of HARTs (HARdware Threads) supported
# Actually 256 threads but since Master Shire is enabled,
# the memory map for each thread needs to extend to 2112 threads.
# TBD: Could fix AAPG to be smarter about IDs allocated per configuration.
NumberOfHARTs = 2112
