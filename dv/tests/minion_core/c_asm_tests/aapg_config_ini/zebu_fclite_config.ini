#
# Default configuration running on Zebu platform with DDR model.
# BEMU: Shire 0 (32 cores) + S32 (32 core) + NoC + IO-Shire + P-shire + Memshire + 16 GB DDR + Arch monitors on all minion shire cores
#
[DEFAULT]
# Default number of instructions to generate
NumberOfInstructions = 1000000

# Default number of HARTs (HARdware Threads) supported
NumberOfHARTs = 2112

IsMasterShireActive = 1

[LOOPS]
# Maximum number of nested loops
MaxNestedLoops = 1

# Max number of iterations for a loop
MaxLoopIterations = 2

# Maximum number of instructions that can be jumped over during forward jumps
ForwardBranchRange = 10

# Maximum number of instructions within a loop is roughly loopRange
LoopRange = 10

[INSTRUCTIONS_BASE]
# Percentage split of Base Integer instructions
# The sum of the percentage(s) below must add up to 100.
Computational = 59
ControlTransfer = 1
LoadStore = 20
System = 20

[INSTRUCTIONS_ATOMIC]
# SCP on Global Atomic(s) for Shire(s)
MaxGlobalSCPAtomicShireID = 0

[INSTRUCTIONS_NON_STANDARD_EXTENSIONS]
# Broadcast Mask for the Minion Shires that are available
MinionShireBroadcastMask = 0x1

[END_OF_TEST]
# Use UART to signal End-Of-Test?
UseUART = 1

[FEATURE]
# Is Secure Memory Mode?
# This is a setting controlled by mprot[6]
IsSecureMemoryMode = 0
