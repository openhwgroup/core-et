[DEFAULT]

# Default number of instructions to generate
NumberOfInstructions = 100

[REGISTERS]
# Read all CSRs at the Start of Test (after Mode switch)
ReadAllCSRsSOT = 1

# Read all CSRs at the End of Test (after main random code)
ReadAllCSRsEOT = 1

ReadWriteCSRsSOT = 1

[FEATURE]
# Is Secure Memory Mode?
# This is a setting controlled by mprot[6]
IsSecureMemoryMode = 1
