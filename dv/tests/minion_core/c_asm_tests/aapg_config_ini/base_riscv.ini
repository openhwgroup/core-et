[LOOPS]
# Maximum number of nested loops
MaxNestedLoops = 1  

# Max number of iterations for a loop
MaxLoopIterations = 2 

# Maximum number of instructions that can be jumped over during forward jumps
ForwardBranchRange = 10

# Maximum number of instructions within a loop is roughly loopRange
LoopRange = 10

[INSTRUCTIONS]
# Percentage split of instructions 
Base = 60
SPFloat = 30
DPFloat = 0
Privileged = 8
Atomic = 0
Compressed = 0
Illegal = 1
NonStandardExtensions = 1

[INSTRUCTIONS_BASE]
# Percentage split of Base Integer instructions
# The sum of the percentage(s) below must add up to 100.
Computational = 59
ControlTransfer = 1              
LoadStore = 20                    
System = 20

[INSTRUCTIONS_NON_STANDARD_EXTENSIONS]
# This is a sub-grouping of non-standard extensions.
# The sum of the percentage(s) below must add up to 100.
MinionAtomic = 0
MinionCacheControl = 0
MinionCodePrefetch = 1
MinionFastCreditCounter = 1
MinionFastLocalBarrier = 1
MinionIPI = 0
MinionMask = 0
MinionMessaging = 0
MinionPackedSingle = 0
MinionPackedInteger = 0
MinionRasterization = 0
MinionSpecificSequence = 97
MinionTensor = 0
MinionTexture = 0
