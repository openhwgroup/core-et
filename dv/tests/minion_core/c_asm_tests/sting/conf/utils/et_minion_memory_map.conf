# This file contains the Minion memory regions
#
# The idea behind keeping the definition of these regions
# in a separate file is to isolate the regions
# that change when the secure memory is enabled

ET_MINION_DFLT_MEM_MAP = {
    ET_MCODE_REGION : {
        # M-Code Region: 0x80_0000_0000 to 0x80_007F_FFFF
        # The first 2M of the DDR region are reserved for M-code accesses (data and instructions).
        # Any agent issuing requests to this region with lower-privileged modes (S- or U- mode)
        # will get an access fault on the access.
        ENABLE : 1
        P_ADDR : 0x008000000000UL
        SIZE   : 0x000000800000UL
        ATTR   : { }
    }
    ET_OS_REGION : {
        # OS Region: 0x80_0080_0000 to 0x80_FFFF_FFFF
        ENABLE : 1
        P_ADDR : 0x008000800000UL
        SIZE   : 0x0000FF800000UL
        ATTR   : { }
    }
}

ET_MINION_SECURE_MEM_MAP = {
    # Minion: RX in M-mode only
    # SP: RW in all modes
    ET_MCODE_MRX : {
       ENABLE : 1
       P_ADDR : 0x0008000000000UL
       SIZE   : 0x0000000200000UL
       ATTR   : { }
    }

    # FUTURE: This region should be called MDATA, but in order to be consistent with the non-secure mode
    # the name has been changed to ET_MCODE_REGION
    # Minion: RW in M-mode only
    # SP: RW in all modes
    #ET_MDATA_M-RW : {
    ET_MCODE_REGION : {
       ENABLE : 1
       P_ADDR : 0x0008000200000UL
       SIZE   : 0x0000000600000UL
       ATTR   : { }
    }

    # Minion: RX in S-mode / RW in M-mode
    # SP: RW in all modes
    ET_SCODE_SRX_MRW : {
       ENABLE : 1
       P_ADDR : 0x0008000800000UL
       SIZE   : 0x0000000800000UL
       ATTR   : { }
    }

    # Minion: RW in M/S-mode
    # SP: RW in all modes
    ET_SDATA_SRW_MRW : {
       ENABLE : 1
       P_ADDR : 0x0008001000000UL
       SIZE   : 0x0000003000000UL
       ATTR   : { }
    }

    # Minion: RW in M/S-mode / RWX in U-mode
    # SP: RW in all modes
    #ET_OS_U-RWX_S-RW_M-RW : {
    ET_OS_REGION : {
       ENABLE : 1
       P_ADDR : 0x0008004000000UL
       SIZE   : 0x00000FC000000UL
       ATTR   : { }
    }
}

if (ET_TEST_ENV.SECURE_MEMORY == 1):
   SNIPPET_MEM = SNIPPET_MEM + ET_MINION_SECURE_MEM_MAP
else:
   SNIPPET_MEM = SNIPPET_MEM + ET_MINION_DFLT_MEM_MAP
endif
