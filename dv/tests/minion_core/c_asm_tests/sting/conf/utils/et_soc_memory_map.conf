# Overrides for snippet memory block configuration based on
# ET-SOC Memory Map.
# Reference Document: PRM-19 (Memory Map, PMA and PMP)

# Top-Level ET Map (Section 2 of PRM-19)
SNIPPET_MEM = SNIPPET_MEM + {
    ET_MAXION_REGION : {
        # Maxion Region: 0x0000_0000_0000 - 0x0000_0FFF_FFFF
        # It should only be accessible from the Maxions and the service processor.
        ENABLE : 1
        P_ADDR : 0x000000000000UL
        SIZE   : 0x000010000000UL
        ATTR   : { }
    }
    ET_IO_REGION : {
        # IO Region: 0x0000_1000_0000 - 0x0000_1FFF_FFFF
        # The different subregions publicly available to the system (via accesses from Supervisor mode or above)
        ENABLE : 1
        P_ADDR : 0x000010000000UL
        SIZE   : 0x000010000000UL
        ATTR   : { }
    }
    ET_MAILBOX : {
        # Mailbox: 0x0000_2000_0000 - 0x0000_3FFF_FFFF
        ENABLE : 1
        P_ADDR : 0x000020000000UL
        SIZE   : 0x000020000000UL
        ATTR   : { }
    }
    ET_SP_REGION : {
        # Service Processor Region: 0x0000_4000_0000 - 0x0000_7FFF_FFFF
        # This 1G of the address space is completely private to the service processor located in
        # the IOshire and can not be accessed from any other agent. As such, all agents in the
        # platform other than the SP should generate an access fault on any type of access
        # (read, write, execute, atomic) on this region.
        ENABLE : 1
        P_ADDR : 0x000040000000UL
        SIZE   : 0x000040000000UL
        ATTR   : { }
    }
    ET_SCP_REGION : {
        # Scratchpad Region: 0x0000_8000_0000 - 0x0000_FFFF_FFFF
        # "For the first Esperanto platform, scratchpad is limited to 128MB of space."
        # For now, only define the space with address format-1 since it is contiguous for the first 32 shires
        ENABLE : 1
        P_ADDR : 0x0000C0000000UL
        SIZE   : 0x000005000000UL
        ATTR   : { }
    }
    ET_LOCAL_SCP_REGION : {
        # Scratchpad Region: 0x0000_8000_0000 - 0x0000_FFFF_FFFF
        # "For the first Esperanto platform, scratchpad is limited to 128MB of space."
        # For now, only define the space with address format-1 since it is contiguous for the first 32 shires
        ENABLE : 1
        P_ADDR : 0x0000BF800000UL
        SIZE   : 0x000000280000UL
        ATTR   : { }
    }

    ET_SCP_UNUSED_REGION : {
        # Scratchpad Region: 0x0000_8000_0000 - 0x0000_FFFF_FFFF
        # "For the first Esperanto platform, scratchpad is limited to 128MB of space."
        # This is the rest of the SCP region that maybe used in a subsequent stepping/platform.
        ENABLE : 1
        P_ADDR : 0x0000C5000000UL
        SIZE   : 0x00003B000000UL
        ATTR   : { }
    }
    ET_ESR_REGION : {
        # ESR Region: 0x0001_0000_0000 - 0x0001_FFFF_FFFF
        ENABLE : 1
        P_ADDR : 0x80000000UL
        SIZE   : 0x80000000UL
        ATTR   : { }
    }
    ET_RESERVED_REGION : {
        # Reserved Region: 0x0002_0000_0000 - 0x003F_FFFF_FFFF
        ENABLE : 1
        P_ADDR : 0x000200000000UL
        SIZE   : 0x003E00000000UL
        ATTR   : { }
    }
    ET_PCIE_REGION : {
        # PCI-Express Region: 0x40_0000_0000 - 0x7F_FFFF_FFFF
        ENABLE : 1
        P_ADDR : 0x004000000000UL
        SIZE   : 0x004000000000UL
        ATTR   : { }
    }
    ET_DRAM_REGION : {
        # DRAM Region: 0x81_0000_0000 to 0xFF_FFFF_FFFF (From Address Map)
        # DRAM Region: 0x81_0000_0000 to 0x88_FFFF_FFFF (32G from supported 8 MemShire(s) FC Config)
        # DRAM Region: 0x81_0000_0000 to 0x81_FFFF_FFFF (Reserve this 4G range for Sting instructions)
        # DRAM Region: 0x82_0000_0000 to 0x88_FFFF_FFFF (Actual DRAM Region available for use)
        ENABLE : 1
        P_ADDR : 0x008200000000UL
        SIZE   : 0x000600000000UL
        ATTR   : { }
    }
}

if (ET_L2SCP.L2SCP_IN_MEM_SET == 0):
    SNIPPET_MEM.ET_SCP_REGION.ENABLE = 0
    SNIPPET_MEM.ET_LOCAL_SCP_REGION.ENABLE = 0
    SNIPPET_MEM.ET_SCP_UNUSED_REGION.ENABLE = 0
else:
    if (ET_MEM_ALIAS.L2SCP == 0):
        SNIPPET_MEM.ET_LOCAL_SCP_REGION.ENABLE = 0
    elif (ET_MEM_ALIAS.L2SCP == 1):
        SNIPPET_MEM.ET_SCP_UNUSED_REGION.ENABLE = 0
        SNIPPET_MEM.ET_SCP_REGION.ENABLE = 0
    endif
endif

