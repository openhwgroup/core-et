#ETDV_SILICON_ON_TARGET_GEN
# ETDV_BUILD = 'shire'

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$STING_ROOT/regress.d/confs/riscv/workloads/isa_stressor.conf"

ET_TEST_ENV.SILICON_MODE = 1

# NUM_TESTS has been set to 1, but the presence of SNP_ISA_Stressor in the test will guarantee that all
# the 100 iterations will result in a different instruction stream being generated and executed.
STING_CONF.NUM_TESTS=1
STING_CONF.NUM_TEST_ITERS=100

# Set NPASS checking for additional checking and set the proper flags
STING_CONF.ENABLE_N_PASS_CHECKING=1
KERNEL_PARAMS.USE_TB_MEM_RANDOMIZATION=0
