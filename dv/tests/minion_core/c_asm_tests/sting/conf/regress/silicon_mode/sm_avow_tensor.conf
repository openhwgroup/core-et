#ETDV_SILICON_SELFCHECK
#ETDV_SEED_MULTIPLIER=4
# ETDV_BUILD = 'shire'

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/utils/et_minion_shire_mem.conf"

import "$MINION_DIAGS/sting/conf/sm_aux_src.conf"

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 2000

ET_TEST_ENV.STING_RAND = 0
ET_TEST_ENV.USE_TENSOR_SCP_OPS = 1
ET_TEST_ENV.SELF_CHECK_ENABLE  = 1
ET_TEST_ENV.SCP_ENABLE = 1

ET_TEST_ENV.SILICON_MODE = 1

ET_SM_TENSOR = {
   SNP_sm_tensor_load : 150
   SNP_sm_tensor_b    : 150
   SNP_sm_tensor_tfma : 150
   SNP_sm_tensor_quant : 150
   SNP_fill_l1scp : 5
   SNP_fill_vpurf : 10
}

# Tensor Load L2
if (ET_L2SCP.INCL_TL_L2SCP_OPS == 1):
   ET_SM_TENSOR = ET_SM_TENSOR + {
      SNP_sm_tensor_load_l2 : 50
   }
endif

# Tensor Reduce
if BOARD_CONF.NUM_CPUS >= 4:
   ET_SM_TENSOR = ET_SM_TENSOR + {
      SNP_sm_tensor_reduce : 50
      SNP_sm_tensor_reduce_snd_rcv : 15
   }
endif

if ET_TEST_ENV.USE_TENSOR_SCP_OPS != 0:
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_clear_tenc : 1 }
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_init_gro_mem : 1},
                                                       { SNP_fill_l1scp : 1 },
                                                       { SNP_fill_vpurf : 1 },
                                                       { SNP_fill_seq_gmem : 1 },
                                                       { SNP_menable_shadows : 1 }
                                                  ]
endif

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = ET_SM_TENSOR
