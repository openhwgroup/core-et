#ETDV_DEV

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"

import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 5000

# Run machine mode more often to exercise valid cases
PRIV_LEVEL = {
    USER        :  0     # User mode
    SUPERVISOR  :  0     # Supervisor
    MACHINE     :  10    # Machine
}

ET_TEST_ENV.SCP_ENABLE = 1
ET_TEST_ENV.SELF_CHECK_ENABLE = 0

RV_LDST_GRP = RV_LDST_GRP + {
                             SNP_cacheops_wait        : 20
                             SNP_lock_or_unlock_sw    : 30
                             SNP_lock_or_unlock_va    : 30
                             SNP_prefetch_va          : 40
                             SNP_evict_or_flush_sw    : 50
                             SNP_evict_or_flush_va    : 50
                             SNP_tensor_ldst_mixed    : 100
                             SNP_init_fp_regs         : 10
                             SNP_tensor_load_b        : 30
                            }

# Tensor Load L2
if (ET_L2SCP.INCL_TL_L2SCP_OPS == 1):
   RV_LDST_GRP = RV_LDST_GRP + {
      SNP_tensor_load_l2scp    : 70
   }
endif


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_LDST_GRP

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp     : 1 },
                                                       { SNP_clear_tenc       : 1 },
                                                       { SNP_init_fp_regs     : 1 },
                                                  ]

if STING_CONF.ENABLE_N_PASS_CHECKING == 1:
   CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                          { SNP_init_tensor_gmem : 1 }
                                                     ]
endif
