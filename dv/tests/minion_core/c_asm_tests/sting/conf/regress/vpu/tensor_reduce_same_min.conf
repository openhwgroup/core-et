REG_MAP.SNIP_ALL_CPU_BASE_REGS[0].SIZE = TEST_PROPS.MEM_REGION_SZ
REG_MAP.SNIP_ALL_CPU_BASE_REGS[1].SIZE = TEST_PROPS.MEM_REGION_SZ
REG_MAP.SNIP_ALL_CPU_BASE_REGS[2].SIZE = TEST_PROPS.MEM_REGION_SZ
REG_MAP.SNIP_ALL_CPU_BASE_REGS[3].SIZE = TEST_PROPS.MEM_REGION_SZ
