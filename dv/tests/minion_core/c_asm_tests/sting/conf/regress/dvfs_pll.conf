# ETDV_DVFS
# ETDV_MIN_HARTS = 16
# ETDV_BUILD = 'shire'
# ETDV_SEED_MULTIPLIER = 5
# ETDV_PLUSARGS = ' +APB_INJ_LOCK_DLL_AT_REF_CLOCK +LVDPLL_MODE=750MHz +STRAP_LVDPLL=100 +DVFS_ENABLE_LVDPLL_FREQ_CHECK_ASRT '
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/rand/rand.conf"

ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
                                     SNP_dvfs_pll : 75
                                  }

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS = CPU[0].OP_GROUPS + {
                                                            RSG : RAND_SNIPPET_GRP
                                                            ESG : ET_SNIPPET_GRP
                                                          }

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.RAND_SNIPPET = {
                                                      RSG : 1
                                                      ESG : 1
                                                    }

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                       { SNP_dvfs_pll_start : 1 }
                                                  ] + CPU[0].OP_GROUPS.TEST_START
