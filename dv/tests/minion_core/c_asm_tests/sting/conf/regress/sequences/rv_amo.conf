ET_TEST_ENV.STING_RAND = 0
ET_TEST_ENV.SELF_CHECK_ENABLE  = 1

SEQ_RV_AMO = RV_LDST_GRP + {
   SNP_rv_amo : 300
   SNP_fill_vpurf : 10
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_init_gro_mem : 1},
                                                       { SNP_fill_vpurf : 1 },
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = SEQ_RV_AMO
