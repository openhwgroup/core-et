#ETDV_DEV

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"
import "$MINION_DIAGS/sting/conf/regress/cacheops/cops_priv_sel.conf"


RV_LDST_GRP = RV_LDST_GRP + {
                             SNP_cache_control_except : 2
                             SNP_cacheops_wait : 20
                             SNP_lock_or_unlock_va : 20
                             SNP_prefetch_va : 20
                             SNP_evict_or_flush_va : 20
                            }

if PRIV_LEVEL.MACHINE != 0 :
   RV_LDST_GRP = RV_LDST_GRP + {
                                SNP_evict_or_flush_sw : 20
                                SNP_lock_or_unlock_sw : 20
                               }
elif PRIV_LEVEL.SUPERVISOR != 0:
   RV_LDST_GRP = RV_LDST_GRP + {
                                SNP_evict_or_flush_sw : 2
                                SNP_lock_or_unlock_sw : 2
                               }
elif PRIV_LEVEL.USER != 0:
   RV_LDST_GRP = RV_LDST_GRP + {
                                SNP_evict_or_flush_sw : 2
                                SNP_lock_or_unlock_sw : 2
                               }
endif


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_LDST_GRP

