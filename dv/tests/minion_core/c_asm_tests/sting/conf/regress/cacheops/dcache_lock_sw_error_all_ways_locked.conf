    USER        :  0     # User mode
    SUPERVISOR  :  0     # Supervisor
    MACHINE     :  10    # Machine
}

RV_LDST_GRP = RV_LDST_GRP + {
                             SNP_lock_sw_error_all_ways_locked : 150
                            }


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_LDST_GRP

