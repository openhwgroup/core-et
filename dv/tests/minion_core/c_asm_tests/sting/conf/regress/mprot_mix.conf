#ETDV_DEV
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"

# ETDV_MIN_HARTS = 10000

#ETDV_BUILD = 'shire'

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 25
ET_TEST_ENV.SCP_ENABLE = 1

# we have to add tensor_load_pma_ok and SNP_tensor_store_pma_ok
RV_MIX_WITH_MPROT_GRP = RV_LDST_GRP + {
    SNP_regular_ldst_pma_ok : 50    
    SNP_ps_pi_pma_ok : 50
    SNP_tensor_load_pma_ok: 50
    SNP_tensor_store_pma_ok: 50
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_MIX_WITH_MPROT_GRP

#Number of operations is setting by default at 10000
#CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 10000

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_fill_l1scp : 1 }
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                      { SNP_set_mprot : 1 }
                                                  ]


