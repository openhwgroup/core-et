# ETDV_MIN_HARTS = 4
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/utils/et_minion_shire_mem.conf"
import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"

# Run machine mode more often to exercise valid cases
PRIV_LEVEL.SUPERVISOR=0
PRIV_LEVEL.USER=0
ET_TEST_ENV.SCP_ENABLE = 1

RV_TWT = RV_LDST_GRP + {
   SNP_tensor_reduce_auto        : 50
   SNP_tensor_wait_tensors       : 50
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_TWT

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]
