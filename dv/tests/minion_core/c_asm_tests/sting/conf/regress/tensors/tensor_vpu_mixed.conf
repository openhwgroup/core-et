#ETDV_DEV
# ETDV_BUILD = 'shire'
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/utils/et_minion_shire_mem.conf"
import "$MINION_DIAGS/sting/conf/regress/only_vpu.conf"

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 5000
ET_TEST_ENV.SCP_ENABLE = 1

RV_TENSOR_VPU = RV_VPU_GRP + {
   SNP_tensor_fma_tena              : 150

   SNP_tensor_store                 : 100
   SNP_tensor_load_b                : 100
}

if (ET_TEST_ENV.SCP_ENABLE == 1):
   RV_TENSOR_VPU = RV_TENSOR_VPU + {
      SNP_tensor_quant              : 150
   }
endif


if BOARD_CONF.NUM_CPUS <= 2 :
   KERNEL_PARAMS.USE_TB_MEM_RANDOMIZATION = 0

   CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                          { SNP_fill_l1scp : 1 }
                                                     ]
else :
   RV_TENSOR_VPU = RV_TENSOR_VPU + {
      SNP_tensor_reduce_auto           : 50
      SNP_tensor_reduce_broadcast_only : 50
   }
endif

RV_TENSOR_VPU = RV_TENSOR_VPU + {
   SNP_Branch_Shadow     : 80
   SNP_Branch_Backward   : 80
   SNP_Branch_JAL_Basic  : 20
   SNP_Branch_JALR_Basic : 20
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_TENSOR_VPU

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_init_fp_regs : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_clear_tenc : 1 }
                                                  ]
