#ETDV_DEV
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"

RV_LDST_COP_GRP = {
    LBU_i      : 5
    LHU_i      : 5
    LB_i       : 5
    LH_i       : 5
    LW_i       : 5
    SB_i       : 5
    SH_i       : 5
    SW_i       : 5
}

if RV_PARAMS.HAS_C_EXT == 1:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        C_LW_i : 5
        C_SW_i : 5
        SNP_ISA_C_LWSP : 5
        SNP_ISA_C_SWSP : 5
    }
endif

if RV_PARAMS.HAS_RV64I == 1:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        LWU_i : 5
        LD_i  : 5
        SD_i  : 5
    }
endif

if RV_PARAMS.HAS_RV64I == 1 and RV_PARAMS.HAS_C_EXT == 1:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        C_LD_i : 5
        C_SD_i : 5
        SNP_ISA_C_LDSP : 5
        SNP_ISA_C_SDSP : 5
    }
endif

if RV_PARAMS.HAS_F_EXT == 1:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        FLW_i : 5
        FSW_i : 5
    }
endif

if RV_PARAMS.HAS_F_EXT == 1 and RV_PARAMS.HAS_C_EXT == 1 and RV_PARAMS.HAS_RV64I == 0 and RV_PARAMS.HAS_RV128I == 0:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        C_FLW_i : 5
        C_FSW_i : 5
        SNP_ISA_C_FLWSP : 5
        SNP_ISA_C_FSWSP : 5
    }
endif

if RV_PARAMS.HAS_D_EXT == 1:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        FLD_i : 5
        FSD_i : 5
    }
endif

if RV_PARAMS.HAS_D_EXT == 1 and RV_PARAMS.HAS_C_EXT == 1 and RV_PARAMS.HAS_RV128I == 0:
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        C_FLD_i : 5
        C_FSD_i : 5
        SNP_ISA_C_FLDSP : 5
        SNP_ISA_C_FSDSP : 5
    }
endif

if ((ET_L2SCP.L2SCP_IN_MEM_SET == 1) and (ET_MEM_ALIAS.L2SCP == 0)):
    # 'SNP_basic_mem_access' needs L2SCP memory to be part of the memory set
    RV_LDST_COP_GRP = RV_LDST_COP_GRP + {
        SNP_basic_mem_access : 100
    }
endif

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_LDST_COP_GRP
CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 500
