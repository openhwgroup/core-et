import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/tensors/tensor_store.conf"


# FUTURE: Not force the test to run in Machine Mode
# This is currently done in order to be able to set the L1SCP
PRIV_LEVEL.SUPERVISOR=0
PRIV_LEVEL.USER=0
ET_TEST_ENV.SCP_ENABLE = 1

# RV_TST contains valid tensor load accesses
# So we mix valid tensor_loads with other tloads that access other mem regions
RV_TST_PMA = RV_TST + {
   SNP_tensor_store_pma_error : 100
   SNP_tensor_store_pma_ok    : 20
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_TST_PMA

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]

#CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 10000
