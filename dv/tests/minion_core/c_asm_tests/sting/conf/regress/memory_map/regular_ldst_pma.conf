#ETDV_DEV
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"


# This is currently done in order to be able to set the L1SCP

ET_TEST_ENV.SCP_ENABLE = 1

RV_REGULAR_LDST_GRP = {
    SNP_regular_ldst_pma_err : 50
    SNP_regular_ldst_pma_ok : 50
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_REGULAR_LDST_GRP
CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 50

