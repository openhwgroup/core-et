# ETDV_SEED_MULTIPLIER = 0

ET_TEST_ENV.STING_RAND = 1

if ET_TEST_ENV.SILICON_MODE == 1:
   ET_TEST_ENV.SELF_CHECK_ENABLE  = 1
else:
   ET_TEST_ENV.SELF_CHECK_ENABLE  = 0
endif



CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START =  [
                                                         { SNP_init_fp_regs     : 1 },
                                                   ] + CPU[0].OP_GROUPS.TEST_START


ET_SNIPPET_GRP = {

    SNP_prefetch_va                   : @cpa_urandrange(2,20)
    SNP_lock_or_unlock_sw             : @cpa_urandrange(2,20)
    SNP_lock_or_unlock_va             : @cpa_urandrange(2,20)
    SNP_evict_or_flush_sw             : @cpa_urandrange(2,20)
    SNP_evict_or_flush_va             : @cpa_urandrange(2,20)

    SNP_lock_sw_error_pa              : @cpa_urandrange(1,10)
    SNP_lock_sw_error_all_ways_locked : @cpa_urandrange(1,10)
    SNP_cacheops_wait                 : @cpa_urandrange(2,20)
    SNP_convolution_ctrl              : @cpa_urandrange(2,20)
    SNP_convolution_size              : @cpa_urandrange(2,20)

    SNP_exclusive_mode                : @cpa_urandrange(2,20)
    SNP_random_csr_read               : @cpa_urandrange(10,50)
    SNP_illegal_insn                  : @cpa_urandrange(10,50)

    SNP_exclusive_mode                : @cpa_urandrange(2,20)
    SNP_cache_invalidate              : @cpa_urandrange(2,20)
    SNP_minst_mask_match              : @cpa_urandrange(2,20)
}

import "$MINION_DIAGS/sting/conf/regress/rand/rand_tensor.conf"

# AND_MODE 0: IPI_filter will be all the active minions and IPI redirect trigger will write only the active minions in the Neigh
# AND_MODE 1: IPI_filter will be all bits set           and IPI redirect trigger will write only the active minions in the Neigh
# AND_MODE 2: IPI_filter will be all the active minions and IPI redirect trigger will write all bits set to 1
IPI_REDIRECT.AND_MODE = @cpa_urandrange(0, 3)
IPI_REDIRECT.DELEGATE_TO_S = 0

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                   { SNP_ipi_redirect_pc     : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_START

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                   { SNP_ipi_redirect_filter : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_START

ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
   SNP_ipi_trigger                      : @cpa_urandrange(2,20)
   SNP_ipi_redirect                     : @cpa_urandrange(2,20)
   SNP_ipi_redirect_read                : @cpa_urandrange(2,10)
   SNP_ipi_trap                         : @cpa_urandrange(2,10)
   # Disable IPREFETCH RTLMIN-6241
   #SNP_iprefetch                        : @cpa_urandrange(2,20)
}


if BOARD_CONF.NUM_CPUS <= 64:
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
   SNP_static_flb_fcc             : @cpa_urandrange(2,20)
   SNP_static_flb_fcc_cov         : @cpa_urandrange(2,5)
}
endif


import "$MINION_DIAGS/sting/conf/regress/rand/rand_testing.conf"

# Currently TEST LOOP only works in single shire environments because FLB/FCC sync is needed
# before starting a new iteration and FLB only works at shire level
import "$MINION_DIAGS/sting/conf/regress/test_start_end/eot_loop_end.conf"
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_END = [
                                                   { SNP_flb_fcc_sync_threads : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_END

