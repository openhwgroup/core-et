# ETDV_SEED_MULTIPLIER = 0

# This file contains all the Tensor related snippets that are added into Sting Rand
# This file is not intended to be run as is, instead, it should be imported in another file

ET_TEST_ENV.USE_TENSOR_SCP_OPS = @cpa_urandrange(0,6)
SEQ_ENV.MIX = @cpa_urandrange(0, 2)


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START =  [
                                                         { SNP_convolution_init : 1 },
                                                         { SNP_enable_coop_mode : 1 },
                                                         { SNP_dummy_tensor_load : 1 }
                                                   ] + CPU[0].OP_GROUPS.TEST_START

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                         { SNP_init_gro_mem : 1},
                                                         { SNP_fill_vpurf : 1 },
                                                  ]

if ET_TEST_ENV.USE_TENSOR_SCP_OPS > 1:
   ET_TEST_ENV.SCP_ENABLE = 1
   CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START =  [
                                                            { SNP_fill_l1scp : 1 },
                                                            { SNP_fill_seq_gmem : 1 },
                                                            { SNP_clear_tenc   : 1 }
                                                      ] + CPU[0].OP_GROUPS.TEST_START
   
   CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START =  [
                                                            { SNP_enable_l1scp : 1 }
                                                      ] + CPU[0].OP_GROUPS.TEST_START

   RAND_SNIPPET_GRP.SNP_Branch_Nested_Loops = 0

   if STING_CONF.ENABLE_N_PASS_CHECKING == 1:
      CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                             { SNP_init_tensor_gmem : 1 }
                                                        ] + CPU[0].OP_GROUPS.TEST_START
   endif
else:
   ET_TEST_ENV.SCP_ENABLE = 0
endif




# Testing different configs
if   ET_TEST_ENV.USE_TENSOR_SCP_OPS == 0:
   # SCP OFF / NO TENSOR OPS
   TENSOR_ENV.TEN_MIN_BIAS = 0
   TENSOR_ENV.TEN_MID_BIAS = 1
   TENSOR_ENV.TEN_MAX_BIAS = 1
elif ET_TEST_ENV.USE_TENSOR_SCP_OPS == 1:
   # SCP OFF / TENSOR OPS
   TENSOR_ENV.TEN_MIN_BIAS = 1
   TENSOR_ENV.TEN_MID_BIAS = 2
   TENSOR_ENV.TEN_MAX_BIAS = 2
else :
   # SCP ON / TENSOR OPS
   TENSOR_ENV.TEN_MIN_BIAS = 2
   TENSOR_ENV.TEN_MID_BIAS = 10
   TENSOR_ENV.TEN_MAX_BIAS = 20
endif



############################################################
##  Tensor Ops that do not require L1SCP
############################################################

# Tensor Store
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_store                  : @cpa_urandrange(2,20)
}
if BOARD_CONF.NUM_CPUS >= 4:
   # Require at least 2 Minions for the cooperation
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
       SNP_tensor_store_coop             : @cpa_urandrange(2,20)
   }
endif

# Tensor Reduce
if BOARD_CONF.NUM_CPUS >= 4:
   # Require at least 2 Minions for reducing
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
       SNP_tensor_reduce_snd_rcv            : @cpa_urandrange(2,20)
       SNP_tensor_reduce_auto               : @cpa_urandrange(2,20)
       SNP_tensor_reduce_broadcast_only     : @cpa_urandrange(2,20)
   }
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
       SNP_tensor_reduce_snd_rcv_cov        : @cpa_urandrange(2,10)
       SNP_tensor_reduce_auto_cov           : @cpa_urandrange(2,10)
       SNP_tensor_reduce_broadcast_only_cov : @cpa_urandrange(2,10)
   }
endif

if (ET_TEST_ENV.SCP_ENABLE == 1):
   # Tensor Quant
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
       SNP_tensor_quant                  : @cpa_urandrange(2,20)
   }
endif

# Other Tensor Operations
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_wait_tensors           : @cpa_urandrange(2,20)
    SNP_tensor_reduce_err             : @cpa_urandrange(2,20)
}



############################################################
## Tensor Ops that require L1SCP
############################################################

# Tensor Load
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_load                   : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
    SNP_tensor_load_b                 : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
    SNP_tensor_load_coop              : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
}
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_load_cov               : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
    SNP_tensor_load_b_cov             : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
    #SNP_tensor_load_coop_cov          : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
}

if (ET_TEST_ENV.SCP_ENABLE == 1):
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
       SNP_tensor_load_pma_error         : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
       #SNP_tensor_load_same_coopid       : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
   }
endif

if (ET_L2SCP.INCL_TL_L2SCP_OPS == 1):
   ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
      SNP_tensor_load_l2scp             : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
      SNP_tensor_load_l2scp_cov         : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   }
endif

# Tensor Store SCP
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_store_from_scp         : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
}

# Tensor FMA
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_fma_tena               : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
}

# Tensor Mix
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
    SNP_tensor_ldst_mixed             : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
    SNP_tensor_ldst_tfma_mixed        : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
}


############################################################
## Tensor Sequences
############################################################
ET_SNIPPET_GRP = ET_SNIPPET_GRP + {
   SNP_any_tensor_seq : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
   SNP_amo_tensor     : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
   SNP_ps_tensor      : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MAX_BIAS)
   SNP_ps_amo_tensor  : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   SNP_conv_tl        : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   SNP_tl_tfma        : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   SNP_ts_tlb_tfma    : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   SNP_fill_l1scp     : @cpa_urandrange(TENSOR_ENV.TEN_MIN_BIAS,TENSOR_ENV.TEN_MID_BIAS)
   SNP_fill_vpurf     : @cpa_urandrange(2,10)

}
