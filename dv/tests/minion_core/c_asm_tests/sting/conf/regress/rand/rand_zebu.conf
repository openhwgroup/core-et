# ETDV_SEED_MULTIPLIER = 0

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"

# For big builds (e.g. Zebu), we need more memory for the DFLT_MEM_SET
# therefore we are adding more regions to it
SNIPPET_MEM_SETS.DFLT_MEM_SET = SNIPPET_MEM_SETS.DFLT_MEM_SET + [
    { SM : ET_DRAM_REGION       WEIGHT : 4 },
]

ET_TEST_ENV.EOT_ZEBU_HINTS = 1

import "$MINION_DIAGS/sting/conf/regress/rand/rand.conf"
import "$MINION_DIAGS/sting/conf/regress/rand/rand_tail.conf"
