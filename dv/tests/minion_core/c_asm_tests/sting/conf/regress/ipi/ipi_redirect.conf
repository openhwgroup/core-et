# ETDV_BUILD = 'shire'
# ETDV_PLUSARGS = '+WFI_ENDS_TEST=0 +CSR_STALL_DONE_COUNT=-1'

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/regress/only_ldst.conf"

# AND_MODE 0: IPI_filter will be all the active minions and IPI redirect trigger will write only the active minions in the Neigh
# AND_MODE 1: IPI_filter will be all bits set           and IPI redirect trigger will write only the active minions in the Neigh
# AND_MODE 2: IPI_filter will be all the active minions and IPI redirect trigger will write all bits set to 1
IPI_REDIRECT.AND_MODE = @cpa_urandrange(0, 3)

IPI_REDIRECT.DELEGATE_TO_S = @cpa_urandrange(0, 2)

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 256

PRIV_LEVEL = {
    USER        :  1    # User mode
    SUPERVISOR  :  0    # Supervisor
    MACHINE     :  0    # Machine
}

if IPI_REDIRECT.DELEGATE_TO_S == 1:

TEST_PROPS.EN_BASIC_INTERRUPTS = 0
DELEG_SETTINGS_CONF.ECALL_U_TRAP_DELEGATED      = DELEGATED_PRIV_LVL.TO_S
DELEG_SETTINGS_CONF.ILLEGAL_INST_TRAP_DELEGATED = DELEGATED_PRIV_LVL.UNDELEG

endif

ET_IPI_GRP = RV_LDST_GRP + {
              SNP_ipi_redirect : 256
              SNP_ipi_redirect_read : 64
             }

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                   { SNP_ipi_redirect_pc     : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_START

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                   { SNP_ipi_redirect_filter : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_START


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_END = [
                                                   { SNP_flb_fcc_sync_threads : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_END


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = ET_IPI_GRP

