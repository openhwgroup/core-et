# ETDV_MIN_HARTS = 4
# ETDV_MAX_HARTS = 64
# ETDV_BUILD = 'shire'

# We must limit this condig to 64 HARTS because SNP_flb_fcc_sync_threads snippet only works
# at Shire level (FLB limitation)

import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 1024

PRIV_LEVEL = {
    USER        :  1    # User mode
    SUPERVISOR  :  1    # Supervisor
    MACHINE     :  1    # Machine
}

RV_FCC_GRP = {
              SNP_static_flb_fcc : 1
             }


CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_FCC_GRP

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_END = [
                                                   { SNP_flb_fcc_sync_threads : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_END
