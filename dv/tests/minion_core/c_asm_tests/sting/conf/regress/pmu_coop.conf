# ETDV_DEV
# ETDV_MAX_HARTS = 64
# ETDV_BUILD = 'shire'
# ETDV_PLUSARGS = ' +min_pmu_mon_en=1 '
# ETDV_SKIP_BUILD = '1s4n4t'
import "$STING_ROOT/regress.d/confs/riscv/regress_base.conf"
import "$MINION_DIAGS/sting/conf/utils/et_minion_shire_mem.conf"
import "$MINION_DIAGS/sting/conf/regress/only_vpu.conf"

# Run only in the machine mode
PRIV_LEVEL.SUPERVISOR=0
PRIV_LEVEL.USER=0

ET_TEST_ENV.COOP_MODE_ENABLE=1

PMU_ENV = {
   CNTR_NUM  : 0
}

PMU_ENV.CNTR_NUM = @cpa_urandrange(3, 9)

CPU[0-BOARD_CONF.NUM_CPUS].TEST_PROPS.NUM_OPS = 5000


RV_TENSOR_VPU = RV_VPU_GRP + {
   SNP_tensor_load_coop    : 100
   SNP_tensor_store_coop   : 100
}


RV_TENSOR_VPU = RV_TENSOR_VPU + {
   SNP_pmu_read_cntr       : 150
}

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP = RV_TENSOR_VPU

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_l1scp : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_init_fp_regs : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_enable_coop_mode : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_clear_tenc : 1 }
                                                  ]
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = CPU[0].OP_GROUPS.TEST_START + [
                                                       { SNP_pmu_setup_cntr : 1 }
                                                  ]
