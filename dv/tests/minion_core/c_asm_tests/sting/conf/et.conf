
###########
# USE_TENSOR_SCP_OPS: Is used to decide if Tensor Ops using L1 SCP are included in Sting Rand
# SPLIT_ENABLE: This variable is used to specify that L1DCACHE split mode is tested when set_rand_dcache_mode snippet is rendered
# SCP_ENABLE: This variable controls if the L1SCP is enabled or not at the beginning
# COOP_MODE_ENABLE: This variable controls if the Shire Coop Mode is enabled or not (necessary for Coop TL/TS)
# SELF_CHECK_ENABLE: This variable enables or disables the self-check code available in each snippet
# STING_RAND: This variable is used to specify if a snippet is being rendered for Sting Rand or not. Currently is used to put always put a tensor_wait in Sting Rand
# EOT_SELF_CHECK_FCC: This variable controls the self-checking we add at the end of test. Setting this variable to 1 will check thatwe have exactly 0 credits at the end of the test
# AVOW_MODE: This variable is used to control if we add or not random instructions in between sequences. If set to 1, no rand instructions will be added between ops

ET_TEST_ENV = {
   NUM_MINIONS        : 0
   USE_TENSOR_SCP_OPS : 1
   SPLIT_ENABLE       : 1
   SCP_ENABLE         : 0
   COOP_MODE_ENABLE   : 1
   SELF_CHECK_ENABLE  : 1
   STING_RAND         : 0
   EOT_SELF_CHECK_FCC : 0
   EOT_ZEBU_HINTS     : 0
   TEST_LOOP_SIZE     : 1
   SILICON_MODE       : 0
   AVOW_MODE          : 0
   SECURE_MEMORY      : 0
   PMU_EVENT_BASE     : 0
   CHECKPOINT_RATE    : 100
   DVFS_PLL_HART      : 0
   L2SCP_MODE         : 0
}
import "$STING_TEST_PWD/build/et_generated_sting_uargs.conf"
import "$MINION_DIAGS/sting/conf/snippets.conf"
import "$MINION_DIAGS/sting/conf/capi.conf"
import "$MINION_DIAGS/sting/conf/sequence.conf"
import "$MINION_DIAGS/sting/conf/utils.conf"
import "$MINION_DIAGS/sting/conf/workarounds.conf"


TENSOR_ENV = {
   TEN_MIN_BIAS  : 2
   TEN_MID_BIAS  : 10
   TEN_MAX_BIAS  : 20
}

# Gather / Scatter (GSC) operations use the GSC_PROGRESS register to keep
# track of the progress when the instruction traps halfway through its execution.
# By setting USE_GSC_PROGRESS to 1, GSC snippets will try to skip the instruction if traps
# or recover from the trap and re-execute the instruction. If set to 0, GSC_PROGRESS is ignored
# and the instruction is skipped as soon as it traps even if it is halfway of its execution.
GSC_ENV = {
   USE_GSC_PROGRESS : 1
}

# Adding gsc_progress mnemonic
CSR_REGS = CSR_REGS + {
                          gsc_progress : 0x840
                      }


EOT_ENV = {
   FLB_NUM : 0
}

RAND_ENV = {
   INCLUDE_LATEST   : 0
   TESTING_MIN_BIAS : 2
}

IPI_REDIRECT = {
   AND_MODE : 0
   DELEGATE_TO_S : 0
}

# EOT_ENV.FLB_NUM will contain the FLB number used for the FLB/FCC synchronization at the end of the test
EOT_ENV.FLB_NUM = @cpa_urandrange(0, 32)

SNIPPET_MEM.DEFAULT_SNIPPET_MEMORY.SIZE=0x40000

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP.RAND_INST    = 70
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.OPGRP.RAND_SNIPPET = 30

import "$MINION_DIAGS/sting/conf/regress/test_start_end/sot_loop_start.conf"

if STING_CONF.ENABLE_N_PASS_CHECKING == 1:
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                         { SNP_unlock_all_lines : 1},
                                                         { SNP_clear_tensor_error : 1},
                                                  ] + CPU[0].OP_GROUPS.TEST_START
endif

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                         { SNP_clear_l2scp : 1 },
                                                         { SNP_convolution_init : 1 }
                                                  ] + CPU[0].OP_GROUPS.TEST_START
CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_END = [
                                                   { SNP_eot : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_END

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.RAND_SNIPPET = RAND_SNIPPET_GRP

# Add checkpoint snippet
if ET_TEST_ENV.SILICON_MODE == 1:
   import "$MINION_DIAGS/sting/conf/regress/silicon_mode/sm_checkpoint.conf"
endif

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_START = [
                                                     { SNP_init_eot_flb : 1 }
                                                  ] + CPU[0].OP_GROUPS.TEST_START

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST = [
                                               { SNP_flb_fcc_sync_threads : 1 }
                                            ] + CPU[0].OP_GROUPS.TEST

CPU[0-BOARD_CONF.NUM_CPUS].OP_GROUPS.TEST_END = [
                                                   { SNP_flb_fcc_sync_threads : 1 }
                                                ] + CPU[0].OP_GROUPS.TEST_END
