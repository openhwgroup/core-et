# By default L2SCP mode is 0
import "$MINION_DIAGS/sting/conf/utils/et_mem_alias.conf"

if ET_TEST_ENV.L2SCP_MODE == 1:
   import "$MINION_DIAGS/sting/conf/utils/disable_l2scp_in_mem_set.conf"
elif ET_TEST_ENV.L2SCP_MODE == 2:
   import "$MINION_DIAGS/sting/conf/utils/enable_local_l2scp_in_mem_set.conf"
endif

import "$MINION_DIAGS/sting/conf/utils/et_soc_memory_map.conf"
