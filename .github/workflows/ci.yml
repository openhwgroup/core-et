name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  VERILATOR_VERSION: v5.046
  VERILATOR_PREFIX: ${{ github.workspace }}/.verilator
  VERILATOR_CACHE_KEY: verilator-v5.046-ubuntu-24.04
  OSS_CAD_SUITE_DATE: "2026-04-12"
  OSS_CAD_SUITE_PREFIX: ${{ github.workspace }}/.oss-cad-suite
  OSS_CAD_SUITE_CACHE_KEY: oss-cad-suite-2026-04-12-slang-linux-x64

jobs:
  discover_unit_tests:
    name: Discover unit tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.unit_tests.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate unit-test matrix
        id: unit_tests
        run: |
          matrix=$(make ci-unit-test-matrix)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | python3 -m json.tool
          echo ""
          echo "Unit-test directories:"
          make ci-unit-test-dirs

  verilator_cache:
    name: Prepare Verilator cache
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      cache_hit: ${{ steps.cache_verilator.outputs.cache-hit }}
    steps:
      - name: Restore Verilator cache
        id: cache_verilator
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VERILATOR_PREFIX }}
          key: ${{ env.VERILATOR_CACHE_KEY }}

      - name: Build Verilator (cache miss only)
        if: steps.cache_verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git autoconf flex bison \
            libfl2 libfl-dev help2man perl python3 zlib1g-dev
          git clone https://github.com/verilator/verilator.git \
            -b $VERILATOR_VERSION --depth 1
          cd verilator
          autoconf
          ./configure --prefix=$VERILATOR_PREFIX
          make -j$(nproc)
          make install

      - name: Save Verilator cache
        if: steps.cache_verilator.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.VERILATOR_PREFIX }}
          key: ${{ env.VERILATOR_CACHE_KEY }}

      - name: Pack Verilator install artifact (cache miss only)
        if: steps.cache_verilator.outputs.cache-hit != 'true'
        run: tar -C "$VERILATOR_PREFIX" -czf "$RUNNER_TEMP/verilator-install.tgz" .

      - name: Upload Verilator install artifact (cache miss only)
        if: steps.cache_verilator.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: verilator-install
          path: ${{ runner.temp }}/verilator-install.tgz
          if-no-files-found: error
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: verilator_cache
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore Verilator cache
        id: cache_verilator
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VERILATOR_PREFIX }}
          key: ${{ env.VERILATOR_CACHE_KEY }}

      - name: Download Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: verilator-install
          path: ${{ runner.temp }}/verilator-install

      - name: Extract Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        run: |
          mkdir -p "$VERILATOR_PREFIX"
          tar -xzf "${{ runner.temp }}/verilator-install/verilator-install.tgz" -C "$VERILATOR_PREFIX"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make libfl2 libfl-dev zlib1g-dev

      - name: Tool versions
        run: |
          $VERILATOR_PREFIX/bin/verilator --version
          g++ --version

      - name: Add Verilator to PATH
        run: echo "$VERILATOR_PREFIX/bin" >> $GITHUB_PATH

      - name: Lint
        run: make lint

  unit_tests:
    name: Unit test — ${{ matrix.dv_dir }}
    runs-on: ubuntu-24.04
    needs: [verilator_cache, discover_unit_tests]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover_unit_tests.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore Verilator cache
        id: cache_verilator
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VERILATOR_PREFIX }}
          key: ${{ env.VERILATOR_CACHE_KEY }}

      - name: Download Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: verilator-install
          path: ${{ runner.temp }}/verilator-install

      - name: Extract Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        run: |
          mkdir -p "$VERILATOR_PREFIX"
          tar -xzf "${{ runner.temp }}/verilator-install/verilator-install.tgz" -C "$VERILATOR_PREFIX"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make libfl2 libfl-dev zlib1g-dev

      - name: Tool versions
        run: |
          $VERILATOR_PREFIX/bin/verilator --version
          g++ --version

      - name: Add Verilator to PATH
        run: echo "$VERILATOR_PREFIX/bin" >> $GITHUB_PATH

      - name: Run unit test — ${{ matrix.dv_dir }}
        env:
          DV_DIR: ${{ matrix.dv_dir }}
        run: make -C "$DV_DIR" test

      - name: Archive unit coverage — ${{ matrix.dv_dir }}
        if: always()
        env:
          DV_DIR: ${{ matrix.dv_dir }}
          COVERAGE_ARCHIVE: ${{ runner.temp }}/${{ matrix.artifact }}.tgz
        run: |
          if [ -d "$DV_DIR/build" ]; then
            tar -czf "$COVERAGE_ARCHIVE" "$DV_DIR/build"
          else
            tar -czf "$COVERAGE_ARCHIVE" --files-from /dev/null
          fi
          ls -l "$COVERAGE_ARCHIVE"

      - name: Upload unit coverage artifact — ${{ matrix.dv_dir }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/${{ matrix.artifact }}.tgz
          if-no-files-found: error
          retention-days: 7

  coverage:
    name: Coverage dashboard
    runs-on: ubuntu-24.04
    needs: [verilator_cache, unit_tests]
    if: ${{ always() && needs.verilator_cache.result == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore Verilator cache
        id: cache_verilator
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VERILATOR_PREFIX }}
          key: ${{ env.VERILATOR_CACHE_KEY }}

      - name: Download Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: verilator-install
          path: ${{ runner.temp }}/verilator-install

      - name: Extract Verilator install artifact (cache fill fallback)
        if: steps.cache_verilator.outputs.cache-hit != 'true' && needs.verilator_cache.outputs.cache_hit != 'true'
        run: |
          mkdir -p "$VERILATOR_PREFIX"
          tar -xzf "${{ runner.temp }}/verilator-install/verilator-install.tgz" -C "$VERILATOR_PREFIX"

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make libfl2 libfl-dev zlib1g-dev

      - name: Tool versions
        run: |
          $VERILATOR_PREFIX/bin/verilator --version
          g++ --version

      - name: Add Verilator to PATH
        run: echo "$VERILATOR_PREFIX/bin" >> $GITHUB_PATH

      - name: Download unit coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unit-coverage-*
          path: ${{ runner.temp }}/unit-coverage
          merge-multiple: true

      - name: Extract unit coverage artifacts
        run: |
          shopt -s nullglob
          archives=("${{ runner.temp }}"/unit-coverage/*.tgz)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "No unit-test coverage archives found."
          else
            for archive in "${archives[@]}"; do
              echo "Extracting $archive"
              tar -xzf "$archive" -C "$GITHUB_WORKSPACE"
            done
          fi

      - name: Generate LCOV info files
        run: make coverage-report

      - name: List generated LCOV files
        run: |
          echo "build/coverage:"
          find build/coverage -maxdepth 1 -type f | sort

      - name: Generate coverage dashboard
        run: make coverage-html

      - name: Upload coverage dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-dashboard
          path: build/coverview/index.html

      - name: Upload LCOV info files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build/coverage/

  synthesis:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Restore oss-cad-suite cache
        id: cache-oss-cad
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.OSS_CAD_SUITE_PREFIX }}
          key: ${{ env.OSS_CAD_SUITE_CACHE_KEY }}

      - name: Download oss-cad-suite (cache miss only)
        if: steps.cache-oss-cad.outputs.cache-hit != 'true'
        run: |
          mkdir -p $OSS_CAD_SUITE_PREFIX/bin
          OSS_CAD_SUITE_DATE_COMPACT=$(echo $OSS_CAD_SUITE_DATE | tr -d '-')
          curl -sL https://github.com/YosysHQ/oss-cad-suite-build/releases/download/$OSS_CAD_SUITE_DATE/oss-cad-suite-linux-x64-${OSS_CAD_SUITE_DATE_COMPACT}.tgz \
            | tar -xz -C $OSS_CAD_SUITE_PREFIX --strip-components=1

      - name: Save oss-cad-suite cache
        if: steps.cache-oss-cad.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.OSS_CAD_SUITE_PREFIX }}
          key: ${{ env.OSS_CAD_SUITE_CACHE_KEY }}

      - name: Tool versions
        run: |
          export PATH=$OSS_CAD_SUITE_PREFIX/bin:$PATH
          yosys --version
          yosys -m slang -p 'help read_slang' >/dev/null

      - name: Synthesis — fifo_example (iCE40)
        run: |
          export PATH=$OSS_CAD_SUITE_PREFIX/bin:$PATH
          make -C fpga/fifo_example/ice40 synth

      - name: Synthesis — fifo_example (Xilinx Ultrascale+)
        run: |
          export PATH=$OSS_CAD_SUITE_PREFIX/bin:$PATH
          make -C fpga/fifo_example/xilinx synth

      - name: Synthesis — shirecache_pipe_example (iCE40)
        if: false  # disabled: takes >15 min per target
        run: |
          export PATH=$OSS_CAD_SUITE_PREFIX/bin:$PATH
          make -C fpga/shirecache_pipe_example/ice40 synth

      - name: Synthesis — shirecache_pipe_example (Xilinx Ultrascale+)
        if: false  # disabled: takes >15 min per target
        run: |
          export PATH=$OSS_CAD_SUITE_PREFIX/bin:$PATH
          make -C fpga/shirecache_pipe_example/xilinx synth
